<!DOCTYPE html>


<html>
    <head>
        <style>
            #display_schedules{
                border: solid black;
            }
            #add_schedule{
                display: flex;
                flex-direction: column;
                border:solid black;
            }
                .selection_container{
                    position: relative;
                    display: flex;
                    border: dotted red;
                }
                    .selectionFlexElement{
                        position: relative; /* Wichtig für absolute Kinder */
                        background: #eee;
                        /* padding: 20px; */
                    }
                    .selection-calendar-wrapper{
                        position: absolute;
                        left: 5px;
                        z-index: 1;
                        background-color: red;
                    }
                    .day:hover{
                        background-color: blueviolet;;
                    }

            
        </style>
    </head>

    <body>
        <section id  = 'display_schedules'>schedules...</section>

        <section id = 'add_schedule'>
            <h2>Neuer Termin...</h2>
            <input type="text" placeholder="Titel eingeben...">

            <div class = 'selection_container' id = 'start_selection_container'>
                <section class = 'selectionFlexElement'>
                   Beginn: <button id = 'show_start_selection' onclick="toggleVisibility(0)"> 16.April2026</button>
                </section> 

                <section class = 'selectionFlexElement'>
                    <div class = 'selection-calendar-wrapper' id = 'start_calendar_wrapper' hidden>
                        <form class="schedule_date_selection" id = 'choose_start_date'>

                        </form>
                        <button onclick="switchSheetMonth(startSheet, -1);">p</button>

                        <button  onclick="switchSheetMonth(startSheet, +1);">n</button>
                    </div>

                </section>

            </div>

            <div class = 'selection_container' id = 'end_selection_container'>
                <section class = 'selectionFlexElement'>
                    Ende: <button id = 'show_end_selection' onclick="toggleVisibility(1)"> 16.April2026</button>
                </section>
                <section class = 'selectionFlexElement'>
                    <div class = 'selection-calendar-wrapper' id = 'end_calendar_wrapper' hidden>
                        <form class="schedule_date_selection" id = 'choose_end_date'></form>
                        <button> p</button>
                        <button> n</button>
                    </div>
                </section>
            </div>
            <div>Wiederholen:
                
                <select name="recurrence" id="choose_recurrence_unit">
                    <option value="">Jeden Tag</option>
                    <option value="">Jede Woche</option>
                    <option value="">Jeden Montag</option>
                    <option value="">Jedes Jahr</option>
                    <option value="">Benutzerdefiniert...</option>
                </select>
            </div>
        </section>



        <script src = '../scripts/common/calendarSheet.js'></script>
        <script src  = '../builder/calendar_schedule.js'></script>

        
        <script>
            const START_FORM  = document.getElementById('choose_start_date');
            const START_WRAPPER = document.querySelector('#start_calendar_wrapper');

            const END_FORM  = document.getElementById('choose_end_date');
            const END_WRAPPER = document.querySelector('#end_calendar_wrapper');
            const FORMS = [START_FORM, END_FORM]
            const WRAPPERS = [START_WRAPPER, END_WRAPPER]

            let defaultDate = new Date();
            let startSheet = new CalendarSheet(defaultDate);
            let endSheet = new CalendarSheet(defaultDate);

            renderSheets();

            function switchSheetMonth(sheet, diffSigned){
                sheet.increaseOrDecreaseMonth(diffSigned);
                renderSheets();
            }

            function renderSheets(){
                START_FORM.innerHTML = '';
                END_FORM.innerHTML = '';

                console.log(startSheet)
                START_FORM.appendChild(startSheet.toHTML());
                END_FORM.appendChild(endSheet.toHTML());
            }

            function toggleVisibility(i){
                let t  = WRAPPERS[i];
                t.hidden = !t.hidden;
                if(!t.hidden) WRAPPERS[(i + 1) % 2].hidden = true;
            }

            function hideBothCalendars(){
                START_WRAPPER.hidden = true;
                END_WRAPPER.hidden = true;
            }
        </script>
    </body>
    
</html>
